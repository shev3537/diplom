<div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Документация 5G терминала</h1>
    
    <div *ngIf="docs.length === 0" class="text-red-500">
      Нет данных для отображения. Проверьте:
      <ul class="list-disc pl-5">
        <li>Запущен ли Django-сервер</li>
        <li>Есть ли данные по адресу /api/code-documentation/</li>
      </ul>
    </div>
  
    <div *ngFor="let item of docs" class="mb-6 p-4 border rounded">
      <h3 class="text-xl font-semibold">{{item.title}}</h3>
      <p class="whitespace-pre-wrap my-2">{{item.content}}</p>
      <pre class="bg-gray-100 p-2 rounded"><code>{{item.code_example}}</code></pre>
    </div>
  </div>
